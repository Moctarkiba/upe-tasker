<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carré Bleu Personnalisé</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        
        <!-- Le message principal au-dessus -->
        <h1 class="message">Bonne arrivée</h1>
        
        <!-- Le grand carré bleu -->
        <div class="grand-carre">
            
            <!-- 1. En haut à gauche : Vert -->
            <div class="bloc-petit-carre">
                <span class="nom-carre">Vert</span>
                <div class="couleur-carre vert"></div>
            </div>

            <!-- 2. En haut à droite : Jaune -->
            <div class="bloc-petit-carre">
                <span class="nom-carre">Jaune</span>
                <div class="couleur-carre jaune"></div>
            </div>

            <!-- 3. En bas à gauche (sous le Vert) : Blanc -->
            <div class="bloc-petit-carre">
                <span class="nom-carre">Blanc</span>
                <div class="couleur-carre blanc"></div>
            </div>

            <!-- 4. En bas à droite (sous le Jaune) : Noir -->
            <div class="bloc-petit-carre">
                <span class="nom-carre">Noir</span>
                <div class="couleur-carre noir"></div>
            </div>

        </div>

    </div>

</body>
</html>
